    name: Emotions & Spirit
    desc: Calm and empty, spirit guarded within — whence comes disease?
  ru:
    name: Эмоции и дух
    desc: Покой и пустота, дух внутри — откуда придёт болезнь?
  fr:
    name: Émotions & esprit
    desc: Calme et vacuité, l'esprit gardé au-dedans — d'où viendrait la maladie ?
  es:
    name: Emociones y espíritu
    desc: Calma y vacuidad, espíritu guardado dentro — ¿de dónde viene la enfermedad?
  id:
    name: Emosi & Rohani
    desc: Tenang dan hampa, rohani terjaga di dalam — dari mana datangnya penyakit?
