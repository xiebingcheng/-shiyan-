    name: الفصول الأربعة
    desc: الربيع يولد، الصيف ينمو، الخريف يحصد، الشتاء يخزّن

- slug: jingluo
  zh-CN:
    name: 经络穴位
    desc: 经脉所通，穴道所达，保健常按
