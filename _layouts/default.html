<!DOCTYPE html>
<html lang="{{ site.lang | default: 'zh-CN' }}" data-theme="light">
<head>
  {%- include head.html -%}
  {%- feed_meta -%}
  {%- seo -%}
</head>
<body class="layout--{{ page.layout | default: layout | default: 'default' }}">

  <a class="skip-link" href="#main">跳到正文</a>

  {%- include header.html -%}

  <main id="main" class="site-main" role="main">
    {{ content }}
  </main>

  {%- include footer.html -%}

  <script src="{{ '/assets/js/theme.js' | relative_url }}" defer></script>
  <script src="{{ '/assets/js/nav.js' | relative_url }}" defer></script>
  <script src="{{ '/assets/js/i18n.js' | relative_url }}" defer></script>
  {%- if site.search.enabled and page.layout == 'search' -%}
    <script src="{{ '/assets/js/search.js' | relative_url }}" defer></script>
  {%- endif -%}

</body>
</html>
