---
layout: default
---

<article class="page" itemscope itemtype="https://schema.org/WebPage">
  <header class="page__header container">
    <h1 class="page__title" itemprop="headline">{{ page.title }}</h1>
    {%- if page.subtitle -%}
      <p class="page__subtitle">{{ page.subtitle }}</p>
    {%- endif -%}
  </header>
  <div class="page__body container" itemprop="mainContentOfPage">
    {{ content }}
  </div>
</article>
