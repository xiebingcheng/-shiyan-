<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#a82a2a" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#1a1410" media="(prefers-color-scheme: dark)">
<meta name="format-detection" content="telephone=no">
<meta name="referrer" content="no-referrer-when-downgrade">

{%- comment -%} 防止主题闪烁的内联脚本：在 CSS 加载前根据 localStorage 应用主题 {%- endcomment -%}
<script>
  (function () {
    try {
      var t = localStorage.getItem('theme');
      if (!t) {
        t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }
      document.documentElement.setAttribute('data-theme', t);
    } catch (e) {}
  })();
</script>

<link rel="icon" type="image/svg+xml" href="{{ '/assets/img/seal.svg' | relative_url }}">
<link rel="alternate" type="application/rss+xml" title="{{ site.title }} - RSS" href="{{ '/feed.xml' | relative_url }}">
<link rel="alternate" type="application/atom+xml" title="{{ site.title }} - Atom" href="{{ '/atom.xml' | relative_url }}">
<link rel="sitemap" type="application/xml" title="Sitemap" href="{{ '/sitemap.xml' | relative_url }}">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;500;600;700;900&family=Long+Cang&display=swap" rel="stylesheet">

<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

{%- if page.canonical_url -%}
  <link rel="canonical" href="{{ page.canonical_url }}">
{%- endif -%}
